name: CI

on:
  push:
    branches: [main, master, verxio/web]
  pull_request:
    branches: [main, master, verxio/web]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Run CI checks
        run: npm run ci
